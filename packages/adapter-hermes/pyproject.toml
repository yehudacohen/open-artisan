[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "open-artisan-hermes"
version = "0.1.0"
description = "Open Artisan phased workflow plugin for Hermes Agent"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.urls]
Repository = "https://github.com/open-artisan/open-artisan"

[tool.setuptools.packages.find]
include = ["hermes_adapter*"]

[tool.setuptools.package-data]
hermes_adapter = ["tool_contracts.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
