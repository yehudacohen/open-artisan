name: open-artisan
version: 0.1.0
description: Phased workflow enforcement for Hermes agents
entry_point: hermes_adapter
author: Open Artisan

tools:
  - oa_select_mode
  - oa_mark_scan_complete
  - oa_mark_analyze_complete
  - oa_mark_satisfied
  - oa_mark_task_complete
  - oa_submit_task_review
  - oa_submit_auto_approve
  - oa_reset_task
  - oa_request_review
  - oa_submit_feedback
  - oa_check_prior_workflow
  - oa_resolve_human_gate
  - oa_propose_backtrack
  - oa_spawn_sub_workflow
  - oa_analyze_task_boundary_change
  - oa_apply_task_boundary_change
  - oa_route_patch_suggestions
  - oa_resolve_patch_suggestion
  - oa_apply_patch_suggestion
  - oa_report_drift
  - oa_plan_drift_repair
  - oa_apply_drift_repair
  - oa_query_parent_workflow
  - oa_query_child_workflow
  - oa_state
  - oa_list_projects
  - oa_select_project
  - oa_recover_bridge

hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call

dependencies:
  runtime:
    - python >= 3.10
    - bun  # for bridge server subprocess
  python: []  # stdlib only
